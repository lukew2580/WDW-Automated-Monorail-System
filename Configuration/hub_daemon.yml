# WDW Automated Monorail System - Hub Daemon Configuration
# Target: Raspberry Pi 5 hub daemon (track state, sensor polling, command dispatch).
#
# v1 COMMS POLICY: all mobile monorail units (trains) and mainline track
# segments communicate over Bluetooth ONLY. Do NOT enable WiFi for trains or
# mainline track nodes.

comms:
  # Bluetooth is the primary and, for v1, the only radio used for
  # trains + mainline track segments.
  bluetooth_enabled: true

  # --- Reserved for v1.1 (NOT yet implemented) ---
  # barn_wifi_enabled gates an optional WiFi radio mode scoped ONLY to the
  # monorail barn's fixed sensor/motor nodes. The barn is a large fixed
  # installation with many track switches, motors, and sensors spread over a
  # wide area, where Bluetooth range and pairing-count limits do not scale.
  #
  # Scope when implemented: barn FIXED infrastructure nodes only.
  # Mainline trains and track segments always remain Bluetooth-only.
  #
  # Keep this false until the v1.1 WiFi path is actually built. See
  # Documentation/System_Architecture_Refinement.md ->
  # "v1.1 Roadmap: Dual-Radio Communications".
  barn_wifi_enabled: false

  # --- Bluetooth dropout tolerance (RESERVED for v1.1, NOT yet implemented) ---
  # Trains keep a live Bluetooth link while moving; this is the correct primary
  # channel, not a gap. But a moving train's Bluetooth is inherently sporadic:
  # hills, curves, obstructions, and distance can cause brief dropouts even when
  # the system is perfectly healthy. The hub daemon must NOT treat a single
  # missed heartbeat or brief gap as a fault.
  #
  # These fields are placeholder/reserved values for v1.1 and are NOT yet wired
  # into any daemon logic. See Documentation/System_Architecture_Refinement.md ->
  # "v1.1 Roadmap: Bluetooth Dropout Tolerance (Hub Daemon Connection Handling)".
  bluetooth:
    dropout_tolerance:
      # Retain each train's last known command/state during a dropout so a brief
      # reconnect resumes from buffer instead of requiring a full re-init.
      buffer_last_known_state: true
      # Consecutive missed heartbeats tolerated before flagging a REAL fault.
      # Tunable placeholder value; calibrate against real track behavior.
      missed_heartbeat_fault_threshold: 5
      # Alternate/companion time-based threshold (seconds without contact) before
      # escalating to a real fault. Tunable placeholder value.
      fault_timeout_seconds: 10
